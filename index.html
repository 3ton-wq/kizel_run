<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Runner: True Pursuit</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        canvas { background: #333; border: 4px solid #444; }
        #ui { position: absolute; top: 10px; color: gold; font-size: 24px; font-weight: bold; pointer-events: none; z-index: 100; text-shadow: 2px 2px #000; }
        #death-screen { 
            position: absolute; display: none; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); flex-direction: column; justify-content: center; align-items: center; z-index: 200; 
        }
        #death-screen img { max-width: 85%; border: 3px solid #ff4444; }
        #death-screen p { color: white; font-size: 22px; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui">СЧЕТ: <span id="score">0</span></div>
    
    <div id="death-screen">
        <img id="go-gif" src="gameover.gif">
        <p>О НЕТ! ВАЛЁК ПОПАЛ В ПАРОВОЗИК [ПРОБЕЛ]</p>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 400;
canvas.height = 700;

const imgNames = {
    p: 'player.png', c: 'coin.png', bg: 'background.png',
    v1: 'villain1.png', v2: 'villain2.png', v3: 'villain3.png',
    o1: 'obs1.png', o2: 'obs2.png', o3: 'obs3.png', o4: 'obs4.png', o5: 'obs5.png'
};
const images = {};
let loaded = 0;
const total = Object.keys(imgNames).length;

for (let key in imgNames) {
    images[key] = new Image();
    images[key].src = imgNames[key];
    images[key].onload = () => { if (++loaded === total) init(); };
    images[key].onerror = () => { if (++loaded === total) init(); };
}

let score, speed, isGameOver, bgY, currentV;
let obstacles, coins, player, villain;
const laneW = canvas.width / 3;

function init() {
    score = 0; speed = 5; isGameOver = false; bgY = 0;
    obstacles = []; coins = [];
    currentV = Math.floor(Math.random() * 3) + 1;
    
    player = { lane: 1, x: laneW * 1.5, y: 300, w: 70, h: 90 };
    villain = { x: laneW * 1.5, y: 620, w: 90, h: 110 };
    
    document.getElementById("score").innerText = "0";
    document.getElementById("death-screen").style.display = "none";
    
    loop();
}

window.addEventListener("keydown", e => {
    if (isGameOver && e.code === "Space") init();
    if (!isGameOver) {
        if ((e.key === "ArrowLeft" || e.code === "KeyA") && player.lane > 0) player.lane--;
        if ((e.key === "ArrowRight" || e.code === "KeyD") && player.lane < 2) player.lane++;
    }
});

function spawn() {
    if (isGameOver || Math.random() > 0.04) return;
    const lane = Math.floor(Math.random() * 3);
    const x = lane * laneW + laneW / 2;
    
    if (Math.random() > 0.45) {
        obstacles.push({ x, y: -100, type: Math.floor(Math.random() * 5) + 1, flying: false, vx: 0 });
    } else {
        coins.push({ x, y: -100 });
    }
}

function update() {
    if (isGameOver) return;

    spawn();
    bgY = (bgY + speed * 0.4) % canvas.height;
    
    // Игрок движется к цели
    const targetX = player.lane * laneW + laneW / 2;
    player.x += (targetX - player.x) * 0.18;

    // ЗЛОДЕЙ ПРЕСЛЕДУЕТ ИГРОКА ПО X
    villain.x += (player.x - villain.x) * 0.12;

    // Злодей медленно откатывается вниз
    if (villain.y < 620) villain.y += 0.5;

    // Монетки
    for (let i = coins.length - 1; i >= 0; i--) {
        coins[i].y += speed;
        if (Math.abs(player.x - coins[i].x) < 45 && Math.abs(player.y - coins[i].y) < 45) {
            score += 10;
            speed += 0.04;
            document.getElementById("score").innerText = score;
            coins.splice(i, 1);
        } else if (coins[i].y > canvas.height + 50) coins.splice(i, 1);
    }

    // Препятствия
    for (let i = obstacles.length - 1; i >= 0; i--) {
        let o = obstacles[i];
        o.y += speed;
        if (o.flying) o.x += o.vx;

        // Коллизия игрока (запинка)
        if (!o.flying && Math.abs(player.x - o.x) < 45 && Math.abs(player.y - o.y) < 40) {
            o.flying = true;
            o.vx = (o.x < canvas.width/2) ? -10 : 10;
            villain.y -= 130; 
        }

        // Злодей сносит препятствия (теперь учитываем его X)
        if (!o.flying && o.y > villain.y - 30 && Math.abs(o.x - villain.x) < 60) {
            o.flying = true;
            o.vx = (o.x < villain.x) ? -15 : 15;
        }

        if (o.y > canvas.height + 100) obstacles.splice(i, 1);
    }

    // Проверка смерти
    if (villain.y <= player.y + 50) {
        isGameOver = true;
        document.getElementById("death-screen").style.display = "flex";
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. Фон
    if (images.bg.complete) {
        ctx.drawImage(images.bg, 0, bgY, canvas.width, canvas.height);
        ctx.drawImage(images.bg, 0, bgY - canvas.height, canvas.width, canvas.height);
    }

    // 2. Монеты
    coins.forEach(c => ctx.drawImage(images.c, c.x - 20, c.y - 20, 40, 40));

    // 3. Препятствия
    obstacles.forEach(o => {
        ctx.drawImage(images[`o${o.type}`], o.x - 45, o.y - 25, 90, 50);
    });

    // 4. Игрок
    ctx.drawImage(images.p, player.x - player.w/2, player.y - player.h/2, player.w, player.h);

    // 5. Злодей (теперь по центру своей X координаты)
    const vImg = images[`v${currentV}`];
    ctx.drawImage(vImg, villain.x - villain.w/2, villain.y, villain.w, villain.h);
}

function loop() {
    update();
    draw();
    if (!isGameOver) requestAnimationFrame(loop);
}
</script>
</body>
</html>
